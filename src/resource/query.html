<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Player Profile</title>
  <link href="./package/leaflet/leaflet.min.css" rel="stylesheet">
  <script src="./package/leaflet/leaflet.min.js"></script>
  <style>
    @font-face {
      font-family: 'segui-emj';
      src: url('./package/SEGUIEMJ.TTF');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --accent: #7A65DB;
      --accent-soft: rgba(122, 101, 219, 0.18);
      --accent-strong: rgba(122, 101, 219, 0.34);
      --black: #000000;
      --white: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --line: rgba(255, 255, 255, 0.12);
      --panel: rgba(255, 255, 255, 0.06);
      --danger-soft: rgba(255, 110, 110, 0.18);
      --danger-line: rgba(255, 110, 110, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(122, 101, 219, 0.28), transparent 42%),
        linear-gradient(180deg, #111111 0%, #000000 100%);
      font-family: 'segui-emj', 'Segoe UI', sans-serif;
      color: var(--white);
    }

    #container {
      position: relative;
      width: 420px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(160deg, rgba(122, 101, 219, 0.22) 0%, rgba(122, 101, 219, 0.05) 30%, rgba(0, 0, 0, 0.97) 100%);
      box-shadow:
        0 22px 48px rgba(0, 0, 0, 0.52),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    #container::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 24%),
        linear-gradient(180deg, transparent, rgba(122, 101, 219, 0.12));
      pointer-events: none;
    }

    .page-header {
      position: relative;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
    }

    .page-header::after {
      content: '';
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(122, 101, 219, 0.9), transparent);
    }

    .page-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-kicker {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .header-logo {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      box-shadow:
        0 12px 26px rgba(122, 101, 219, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .header-logo img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .header-title {
      margin-top: 14px;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: 0.02em;
    }

    .header-subtitle {
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      line-height: 1.5;
    }

    .profile-card {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border: 1px solid rgba(122, 101, 219, 0.35);
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(122, 101, 219, 0.24), rgba(255, 255, 255, 0.04));
      box-shadow:
        0 14px 30px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .avatar {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.05);
      object-fit: cover;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.28);
    }

    .info {
      flex: 1;
      min-width: 0;
    }

    .name {
      color: var(--white);
      font-size: 22px;
      font-weight: 700;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tmp-id {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.62);
      font-size: 13px;
      line-height: 1.5;
    }

    .tmp-id .group {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.24);
    }

    .content {
      position: relative;
      padding: 14px;
    }

    .section {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .section:first-child {
      margin-top: 0;
    }

    .section-title {
      margin-bottom: 12px;
      color: rgba(255, 255, 255, 0.64);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .form-box {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .form-item {
      min-width: 0;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.28);
    }

    .form-item.full {
      grid-column: 1 / -1;
    }

    .label {
      margin-bottom: 6px;
      color: rgba(255, 255, 255, 0.54);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .value {
      color: var(--white);
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    .position-header,
    .ban-header {
      margin-bottom: 12px;
      color: var(--white);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    #map {
      width: 100%;
      height: 170px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .ban-container {
      border-color: var(--danger-line);
      background: linear-gradient(180deg, rgba(255, 110, 110, 0.16), rgba(255, 255, 255, 0.03));
    }

    .ban-hidden {
      padding: 18px 12px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.22);
      color: rgba(255, 255, 255, 0.62);
      font-size: 14px;
      font-style: italic;
      text-align: center;
    }

    .leaflet-container {
      background: rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <div id="container">
    <div class="page-header">
      <div class="page-header-top">
        <div class="header-kicker">Prime Logistics</div>
        <div class="header-logo">
          <img src="./package/img/logo2.png" alt="Logo">
        </div>
      </div>
      <div class="header-title">Player Profile</div>
      <div class="header-subtitle">Prime Logistics TMP profile lookup</div>
      <div class="profile-card">
        <img class="avatar" id="tmp-avatar" src="" alt="avatar">
        <div class="info">
          <div class="name" id="tmp-name">-</div>
          <div class="tmp-id" id="tmp-id"></div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="section details-container">
        <div class="section-title">Account Details</div>
        <div class="form-box">
          <div class="form-item full">
            <div class="label">Steam ID</div>
            <div class="value" id="tmp-steam-id"></div>
          </div>
          <div class="form-item full">
            <div class="label">Register Date</div>
            <div class="value" id="tmp-register-date"></div>
          </div>
          <div class="form-item">
            <div class="label">Mileage</div>
            <div class="value" id="tmp-mileage"></div>
          </div>
          <div class="form-item">
            <div class="label">Today Mileage</div>
            <div class="value" id="tmp-today-mileage"></div>
          </div>
          <div class="form-item full">
            <div class="label">Last Online Time</div>
            <div class="value" id="tmp-last-online-time"></div>
          </div>
          <div class="form-item full" id="tmp-vtc-box">
            <div class="label">VTC</div>
            <div class="value" id="tmp-vtc-name"></div>
          </div>
          <div class="form-item" id="tmp-vtc-id-box">
            <div class="label">VTC ID</div>
            <div class="value" id="tmp-vtc-id"></div>
          </div>
          <div class="form-item" id="tmp-vtc-join-time-box">
            <div class="label">VTC Join Time</div>
            <div class="value" id="tmp-vtc-join-time"></div>
          </div>
          <div class="form-item full" id="tmp-vtc-role-box">
            <div class="label">VTC Role</div>
            <div class="value" id="tmp-vtc-role"></div>
          </div>
          <div class="form-item" id="tmp-sponsor-box">
            <div class="label">Sponsor</div>
            <div class="value" id="tmp-sponsor-amount"></div>
          </div>
          <div class="form-item" id="tmp-sponsor-cumulative-box">
            <div class="label">Sponsor Total</div>
            <div class="value" id="tmp-sponsor-cumulative"></div>
          </div>
        </div>
      </div>

      <div class="section" id="tmp-vtc-history-section">
        <div class="section-title">VTC History</div>
        <div class="form-box" id="tmp-vtc-history-list"></div>
      </div>

      <div class="section position-container" id="position-box">
        <div class="position-header" id="position-title"></div>
        <div id="map"></div>
      </div>

      <div class="section ban-container" id="ban-box">
        <div class="ban-header">Ban Record</div>
        <div class="ban-hidden" id="ban-hidden-box">This player has hidden ban details.</div>
        <div class="form-box" id="ban-info-box">
          <div class="form-item">
            <div class="label">Until</div>
            <div class="value" id="ban-until"></div>
          </div>
          <div class="form-item">
            <div class="label">Count</div>
            <div class="value" id="ban-count"></div>
          </div>
          <div class="form-item full">
            <div class="label">Reason</div>
            <div class="value" id="ban-reason"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let mapConfig = {
      ets: {
        tileUrl: 'https://ets-map.oss-cn-beijing.aliyuncs.com/ets2/05102019/{z}/{x}/{y}.png',
        multipliers: {
          x: 71282,
          y: 56532
        },
        breakpoints: {
          uk: {
            x: -31056.8,
            y: -5832.867
          }
        },
        bounds: {
          y: 131072,
          x: 131072
        },
        maxZoom: 8,
        minZoom: 2,
        calculateMapCoordinate(x, y) {
          return [
            x / 1.609055 + mapConfig.ets.multipliers.x,
            y / 1.609055 + mapConfig.ets.multipliers.y
          ];
        }
      },
      promods: {
        tileUrl: 'https://ets-map.oss-cn-beijing.aliyuncs.com/promods/05102019/{z}/{x}/{y}.png',
        multipliers: {
          x: 51953,
          y: 76024
        },
        breakpoints: {
          uk: {
            x: -31056.8,
            y: -5832.867
          }
        },
        bounds: {
          y: 131072,
          x: 131072
        },
        maxZoom: 8,
        minZoom: 2,
        calculateMapCoordinate(x, y) {
          return [
            x / 2.598541 + mapConfig.promods.multipliers.x,
            y / 2.598541 + mapConfig.promods.multipliers.y
          ];
        }
      }
    };

    function formatMileage(value) {
      if (value === null || value === undefined || value === '') return '-';
      return `${Number(value).toLocaleString('en-US')} m`;
    }

    function formatDateText(value) {
      return value || '-';
    }

    function createHistoryItem(history) {
      return `
        <div class="form-item full">
          <div class="label">${history.vtcName || 'Unknown VTC'}</div>
          <div class="value">VTC ID: ${history.vtcId ?? '-'}</div>
          <div class="value">Join Date: ${formatDateText(history.joinDate)}</div>
          <div class="value">Quit Date: ${formatDateText(history.quitDate)}</div>
        </div>
      `;
    }

    function init(data) {
      document.getElementById('tmp-name').innerText = data.name;
      document.getElementById('tmp-avatar').src = data.avatarUrl;
      document.getElementById('tmp-id').innerHTML = `TMP#${data.tmpId} <span class="group" style="background-color: #${data.groupColor}">${data.groupName}</span>`;
      document.getElementById('tmp-steam-id').innerText = data.steamId;
      document.getElementById('tmp-register-date').innerText = data.registerDate;
      document.getElementById('tmp-mileage').innerText = formatMileage(data.mileage);
      document.getElementById('tmp-today-mileage').innerText = formatMileage(data.todayMileage);
      document.getElementById('tmp-last-online-time').innerText = formatDateText(data.lastOnlineTime);

      if (data.isJoinVtc) {
        document.getElementById('tmp-vtc-name').innerText = data.vtcName;
        document.getElementById('tmp-vtc-id').innerText = data.vtcId ?? '-';
        document.getElementById('tmp-vtc-join-time').innerText = formatDateText(data.vtcJoinTime);
        document.getElementById('tmp-vtc-role').innerText = data.vtcRole;
      } else {
        document.getElementById('tmp-vtc-box').remove();
        document.getElementById('tmp-vtc-id-box').remove();
        document.getElementById('tmp-vtc-join-time-box').remove();
        document.getElementById('tmp-vtc-role-box').remove();
      }

      if (data.vtcHistory && data.vtcHistory.length) {
        document.getElementById('tmp-vtc-history-list').innerHTML = data.vtcHistory.map(createHistoryItem).join('');
      } else {
        document.getElementById('tmp-vtc-history-section').remove();
      }

      if (data.isSponsor && !data.sponsorHide) {
        document.getElementById('tmp-sponsor-amount').innerText = '$' + Math.floor(data.sponsorAmount / 100);
        document.getElementById('tmp-sponsor-cumulative').innerText = '$' + Math.floor(data.sponsorCumulativeAmount / 100);
      } else {
        document.getElementById('tmp-sponsor-box').remove();
        document.getElementById('tmp-sponsor-cumulative-box').remove();
      }

      if (data.isOnline) {
        document.getElementById('position-title').innerText = `${data.onlineServerName} | ${data.onlineCountry} - ${data.onlineCity}`;
        map(data.onlineMapType, data.onlineX, data.onlineY);
      } else {
        document.getElementById('position-box').remove();
      }

      if (data.isBan) {
        if (data.banHide) {
          document.getElementById('ban-info-box').remove();
        } else {
          document.getElementById('ban-hidden-box').remove();
          document.getElementById('ban-until').innerText = data.banUntil || 'Permanent';
          document.getElementById('ban-count').innerText = (data.banCount || 0) + ' bans';
          document.getElementById('ban-reason').innerText = data.banReasonZh || data.banReason;
        }
      } else {
        document.getElementById('ban-box').remove();
      }
    }

    function map(mapType, x, y) {
      let map = L.map('map', {
        attributionControl: false,
        crs: L.CRS.Simple,
        zoomControl: false
      });

      let bounds = L.latLngBounds(
        map.unproject([0, mapConfig[mapType].bounds.y], mapConfig[mapType].maxZoom),
        map.unproject([mapConfig[mapType].bounds.x, 0], mapConfig[mapType].maxZoom)
      );

      L.tileLayer(mapConfig[mapType].tileUrl, {
        minZoom: 2,
        maxZoom: 10,
        maxNativeZoom: 8,
        tileSize: 512,
        bounds: bounds,
        reuseTiles: true
      }).addTo(map);

      map.setMaxBounds(
        new L.LatLngBounds(
          map.unproject([0, mapConfig[mapType].bounds.y], mapConfig[mapType].maxZoom),
          map.unproject([mapConfig[mapType].bounds.x, 0], mapConfig[mapType].maxZoom)
        )
      );

      L.circleMarker(map.unproject(mapConfig[mapType].calculateMapCoordinate(x, y), 8), {
        color: '#ffffff',
        weight: 2,
        fillColor: '#7A65DB',
        fillOpacity: 1,
        radius: 6
      }).addTo(map);

      map.setView(map.unproject(mapConfig[mapType].calculateMapCoordinate(x, y), 8), 5);
    }
  </script>
</body>
</html>
