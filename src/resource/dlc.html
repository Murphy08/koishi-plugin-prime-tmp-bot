<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>DLC</title>
  <style>
    @font-face {
      font-family: 'segui-emj';
      src: url('./package/SEGUIEMJ.TTF');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --accent: #7A65DB;
      --accent-soft: rgba(122, 101, 219, 0.2);
      --accent-strong: rgba(122, 101, 219, 0.36);
      --black: #000000;
      --white: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --line: rgba(255, 255, 255, 0.12);
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(122, 101, 219, 0.28), transparent 42%),
        linear-gradient(180deg, #111111 0%, #000000 100%);
      font-family: 'segui-emj', 'Segoe UI', sans-serif;
      color: var(--white);
    }

    #dlc-info-container {
      position: relative;
      width: 600px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(160deg, rgba(122, 101, 219, 0.22) 0%, rgba(122, 101, 219, 0.05) 30%, rgba(0, 0, 0, 0.97) 100%);
      box-shadow:
        0 22px 48px rgba(0, 0, 0, 0.52),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    #dlc-info-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 24%),
        linear-gradient(180deg, transparent, rgba(122, 101, 219, 0.12));
      pointer-events: none;
    }

    .header {
      position: relative;
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header::after {
      content: '';
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(122, 101, 219, 0.9), transparent);
    }

    .header-content {
      flex: 1;
      min-width: 0;
    }

    .header-kicker {
      display: inline-flex;
      align-items: center;
      margin-bottom: 8px;
      padding: 4px 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: 0.02em;
      color: var(--white);
    }

    .header-subtitle {
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 12px;
      line-height: 1.5;
    }

    .header-logo {
      margin-left: auto;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      box-shadow:
        0 12px 26px rgba(122, 101, 219, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .header-logo img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    #dlc-list {
      position: relative;
      padding: 14px;
    }

    .dlc-box {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(122, 101, 219, 0.34);
      border-radius: 18px;
      overflow: hidden;
      background-color: rgba(255, 255, 255, 0.04);
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      box-shadow:
        0 14px 30px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .dlc-box:first-child {
      margin-top: 0;
    }

    .header-image {
      width: 210px;
      height: 98px;
      display: block;
      flex-shrink: 0;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
    }

    .dlc-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.56), rgba(0, 0, 0, 0.42));
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(6px);
    }

    .name {
      color: var(--white);
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .desc {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .price-box {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .price-box .final-price {
      color: var(--white);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .price-box .discount-price {
      color: rgba(255, 255, 255, 0.56);
      font-size: 14px;
      text-decoration: line-through;
    }

    .price-box .discount {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--white);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(255, 255, 255, 0.14);
    }
  </style>
</head>
<body>
  <div id="dlc-info-container">
    <div class="header">
      <div class="header-content">
        <div class="header-kicker">Prime Logistics</div>
        <div class="title">DLC 内容概览</div>
        <div class="header-subtitle">Prime Logistics DLC Collection</div>
      </div>
      <div class="header-logo">
        <img src="./package/img/logo2.png" alt="Logo">
      </div>
    </div>
    <div id="dlc-list"></div>
  </div>

  <script>
    function formatPrice(price) {
      return `\u00A5${Math.ceil(price / 100)}`;
    }

    function setData(dlcList) {
      const container = document.querySelector('#dlc-list');
      container.innerHTML = '';

      for (const dlc of dlcList) {
        const dom = document.createElement('div');
        dom.className = 'dlc-box';
        dom.style.backgroundImage = `linear-gradient(90deg, rgba(0, 0, 0, 0.82), rgba(122, 101, 219, 0.24)), url('${dlc.backgroundImageUrl}')`;

        let priceDiscountDom = '';
        if (dlc.discount > 0) {
          priceDiscountDom = `
            <span class="discount-price">${formatPrice(dlc.originalPrice)}</span>
            <span class="discount">-${dlc.discount}%</span>
          `;
        }

        dom.innerHTML = `
          <img class="header-image" src="${dlc.headerImageUrl}" alt="${dlc.name}">
          <div class="dlc-info">
            <div class="name">${dlc.name}</div>
            <div class="desc">${dlc.desc}</div>
            <div class="price-box">
              <span class="final-price">${formatPrice(dlc.finalPrice)}</span>
              ${priceDiscountDom}
            </div>
          </div>
        `;

        container.appendChild(dom);
      }
    }
  </script>
</body>
</html>
